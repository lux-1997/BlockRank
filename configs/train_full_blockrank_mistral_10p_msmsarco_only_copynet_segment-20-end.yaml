# Configuration for large-scale training on full dataset (segment-wise token compression)

model:
  model_name_or_path: ".cache/huggingface/Mistral-7B-Instruct-v0.3"
  use_4bit: false
  use_lora: false
  trust_remote_code: false
  use_blockrank: true
  attn_implementation: "default_blockrank"

data:
  data_path: "data/train/parsed_hard_ids_10p_train.jsonl"  # Full dataset
  streaming: false
  val_data_path: null  # Separate validation
  num_documents: 30
  train_test_split: 0.99  # Ignored when val_data_path is set
  max_seq_length: 6144
  dataset_seed: 42
  max_block_length: 160
  query_in_instruction: true
  remove_doc_id: true  # true => remove explicit 'ID: ... | END ID: ...' wrappers from doc blocks

training:
  output_dir: "outputs/blockrank-10p-msmarco-mistral-7b-only-copynet-segment-20-end"
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4  # Larger effective batch size
  optim: "adamw_8bit"
  learning_rate: 3.0e-6  # Slightly lower for larger dataset
  weight_decay: 0
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 25
  save_steps: 500
  eval_steps: 500
  save_total_limit: 1
  fp16: false
  bf16: true
  gradient_checkpointing: true
  use_liger_kernel: false
  seed: 42
  report_to: "wandb"
  run_name: "blockrank-10p-msmarco-mistral-7b"
  do_eval: true
  evaluation_strategy: "steps"
  load_best_model_at_end: false
  metric_for_best_model: "eval_loss"
  use_aux_loss: true        # Enable auxiliary attention loss
  aux_layer_idx: 20         # Layer to extract attention scores (l* in paper)
  aux_loss_weight: 0.5      # Lambda in paper (default: 0.1)
  aux_temperature: 0.05
  aux_query_token_offset: 0  # In BlockRank split/merge pipeline, supervised completion starts at '['
  query_aggregation_mode: "single" # single / mean_all, logsumexp_all
  aux_num_last_queries: 32
  aux_norm_mode: "doc_only"
  sft_loss_weight: 0.0
  aux_loss_type: "copynet"
  token_compression_mode: "segment"  # segment-wise keep 1 token per k, per doc
  token_compression_segment_k: 20
  token_compression_segment_anchor: "end"
  attention_weighted_top_k: none      # segment mode is strict; no top-k union

  use_doc_align_loss: false
  doc_align_loss_weight: 0.05
