# Evaluation config covering all BEIR-style datasets shipped in data/icr-beir-evals.
# By default, eval_attn.py will use the `data` + `eval` sections below (currently trec_covid).
# The `datasets` list is provided for convenience so you can comment out the ones you
# don't want and loop over them in a small script (see usage notes).

retrieval:
  bm25_top_k: 100  # choose 30 | 50 | 100 | 200 | 300 | 400 | 500

model:
  model_name_or_path: "/code/in_context_retrieval/BlockRank/outputs/full-blockrank-qwen-4b-ins-first-sequential"
  # ÍÍÏÒÛƒÓ§Ûÿ¥
  # attn_implementation: "eager_blockrank"  
  # use_blockrank: false
  attn_implementation: "default_blockrank"   # Ì sdpa_blockrank / eager_blockrank
  
  block_order: "instruction_first"           # instruction_first | doc_first
  doc_cross_attn: false                     # true=doc ð¤Ó¡Í₤ÒÏ(ð£ÍÍ¤docs)ÿ¥false=docð£self

# Default dataset for a single eval run (you can change these manually).
data:
  data_path: "data/icr-beir-evals/bm25-top{bm25_top_k}/trec_covid.jsonl"
  qrels_path: "data/icr-beir-evals/qrels/trec_covid.tsv"
  position_id_mode: "perm_invariant" # perm_invariant | sequential
  query_in_instruction: false
  remove_doc_id: true  # true => remove explicit 'ID: ... | END ID: ...' wrappers from doc blocks

eval:
  num_documents: 100
  output_dir: "outputs/eval_beir_trec_covid"
  seed: 42
  per_device_eval_batch_size: 4
  train_test_split: 1.0
  max_block_length: 384
  aux_layer_idx: 24
  token_compression_mode: "segment"  # none | topk | last | mid_last | segment
  token_compression_last_k: 16     # only used when token_compression_mode=last
  token_compression_segment_k: 10  # only used when token_compression_mode=segment
  token_compression_segment_anchor: "end"  # start | end, only used when token_compression_mode=segment
  attention_weighted_top_k: none     # null/none => last-k only; k => last-k + doc-last-token attention top-k
  token_compression_topk: 1   # only used when token_compression_mode=topk
  # aux_norm_mode: "doc_only"

# Full list of BEIR datasets available locally.
# Comment out any entries you don't want to include in a multi-run loop.
datasets:
  - name: trec_covid
    data_path: "data/icr-beir-evals/bm25-top{bm25_top_k}/trec_covid.jsonl"
    qrels_path: "data/icr-beir-evals/qrels/trec_covid.tsv"
    output_dir: "outputs/eval_beir_trec_covid"
  # - name: nq
